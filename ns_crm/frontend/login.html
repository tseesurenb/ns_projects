<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Нэвтрэх — Multi-Tenant SaaS</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.5/babel.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height: 100vh; }
    .card { backdrop-filter: blur(12px); background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(148, 163, 184, 0.1); }
    .input-field { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(148, 163, 184, 0.2); transition: border-color 0.2s, box-shadow 0.2s; }
    .input-field:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); outline: none; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); transition: transform 0.15s, box-shadow 0.2s; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; width: 18px; height: 18px; }
    .lang-btn { transition: all 0.2s; }
    .lang-btn.active { background: rgba(99, 102, 241, 0.2); border-color: #6366f1; color: #a5b4fc; }
    .lang-btn:not(.active) { background: transparent; border-color: rgba(148, 163, 184, 0.2); color: #94a3b8; }
    .lang-btn:hover:not(.active) { border-color: rgba(148, 163, 184, 0.4); color: #cbd5e1; }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(148, 163, 184, 0.1); }
    .info-row:last-child { border-bottom: none; }
  </style>
</head>
<body class="flex items-center justify-center p-4">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const API_URL = "/api/v1";

    const translations = {
      mn: {
        pageTitle: "Нэвтрэх",
        pageSubtitle: "Байгууллагынхаа бүртгэлд нэвтрэх",
        email: "Имэйл хаяг",
        emailPlaceholder: "ta@company.mn",
        password: "Нууц үг",
        passwordPlaceholder: "Нууц үгээ оруулна уу",
        submitBtn: "Нэвтрэх",
        loggingIn: "Нэвтэрч байна...",
        noAccount: "Бүртгэлгүй юу?",
        register: "Бүртгүүлэх",
        // Success
        welcomeTitle: "Амжилттай нэвтэрлээ!",
        tenantId: "Байгууллагын ID",
        userId: "Хэрэглэгчийн ID",
        tokenType: "Токен төрөл",
        logout: "Гарах",
        // Errors
        errEmailRequired: "Имэйл хаяг оруулна уу.",
        errEmailInvalid: "Зөв имэйл хаяг оруулна уу.",
        errPasswordRequired: "Нууц үг оруулна уу.",
        errInvalidCredentials: "Имэйл эсвэл нууц үг буруу байна.",
        errAccountDeactivated: "Бүртгэл идэвхгүй болсон байна.",
        errServerDown: "Серверт холбогдож чадсангүй. Сервер ажиллаж байгаа эсэхийг шалгана уу.",
        errDefault: "Нэвтрэхэд алдаа гарлаа. Дахин оролдоно уу.",
      },
      en: {
        pageTitle: "Sign in",
        pageSubtitle: "Log in to your organization account",
        email: "Email Address",
        emailPlaceholder: "you@company.com",
        password: "Password",
        passwordPlaceholder: "Enter your password",
        submitBtn: "Sign in",
        loggingIn: "Signing in...",
        noAccount: "Don't have an account?",
        register: "Register",
        // Success
        welcomeTitle: "Successfully signed in!",
        tenantId: "Tenant ID",
        userId: "User ID",
        tokenType: "Token Type",
        logout: "Sign out",
        // Errors
        errEmailRequired: "Email is required.",
        errEmailInvalid: "Please enter a valid email.",
        errPasswordRequired: "Password is required.",
        errInvalidCredentials: "Invalid email or password.",
        errAccountDeactivated: "Account is deactivated.",
        errServerDown: "Could not connect to the server. Is it running on port 8000?",
        errDefault: "Login failed. Please try again.",
      },
    };

    function LanguageSwitcher({ lang, setLang }) {
      return (
        <div className="flex gap-2">
          <button
            onClick={() => setLang("mn")}
            className={`lang-btn px-3 py-1.5 rounded-lg border text-sm font-medium ${lang === "mn" ? "active" : ""}`}
          >
            MN
          </button>
          <button
            onClick={() => setLang("en")}
            className={`lang-btn px-3 py-1.5 rounded-lg border text-sm font-medium ${lang === "en" ? "active" : ""}`}
          >
            EN
          </button>
        </div>
      );
    }

    function App() {
      const [lang, setLang] = useState("mn");
      const t = translations[lang];

      const [form, setForm] = useState({ email: "", password: "" });
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");
      const [success, setSuccess] = useState(null);

      const update = (field) => (e) => {
        setForm({ ...form, [field]: e.target.value });
        setError("");
      };

      const validate = () => {
        if (!form.email.trim()) return t.errEmailRequired;
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) return t.errEmailInvalid;
        if (!form.password) return t.errPasswordRequired;
        return null;
      };

      const mapError = (detail) => {
        if (!detail) return t.errDefault;
        if (detail.includes("Invalid email or password")) return t.errInvalidCredentials;
        if (detail.includes("deactivated")) return t.errAccountDeactivated;
        return detail;
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        const err = validate();
        if (err) { setError(err); return; }

        setLoading(true);
        setError("");

        try {
          const res = await fetch(`${API_URL}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: form.email, password: form.password }),
          });

          const data = await res.json();

          if (!res.ok) {
            setError(mapError(data.detail));
            return;
          }

          // Store token and redirect to dashboard
          localStorage.setItem("token", data.access_token);
          localStorage.setItem("tenant_id", data.tenant_id);
          localStorage.setItem("user_id", data.user_id);
          window.location.href = "dashboard.html";
          return;
        } catch (err) {
          setError(t.errServerDown);
        } finally {
          setLoading(false);
        }
      };

      if (success) {
        return (
          <div className="w-full max-w-md fade-in">
            <div className="flex justify-end mb-4">
              <LanguageSwitcher lang={lang} setLang={setLang} />
            </div>
            <div className="card rounded-2xl shadow-2xl p-8 text-center">
              <div className="w-16 h-16 bg-green-500 bg-opacity-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg className="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                </svg>
              </div>
              <h2 className="text-2xl font-bold text-white mb-6">{t.welcomeTitle}</h2>

              <div className="bg-gray-900 bg-opacity-50 rounded-xl p-4 text-left space-y-3 mb-6">
                <div>
                  <span className="text-gray-500 text-xs uppercase tracking-wider">{t.tenantId}</span>
                  <p className="text-gray-300 text-sm font-mono break-all">{success.tenant_id}</p>
                </div>
                <div>
                  <span className="text-gray-500 text-xs uppercase tracking-wider">{t.userId}</span>
                  <p className="text-gray-300 text-sm font-mono break-all">{success.user_id}</p>
                </div>
                <div>
                  <span className="text-gray-500 text-xs uppercase tracking-wider">{t.tokenType}</span>
                  <p className="text-indigo-400 text-sm font-semibold">{success.token_type}</p>
                </div>
              </div>

              <button
                onClick={() => { setSuccess(null); setForm({ email: "", password: "" }); }}
                className="text-indigo-400 hover:text-indigo-300 text-sm font-medium transition-colors"
              >
                {t.logout}
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="w-full max-w-md fade-in">
          <div className="flex justify-end mb-4">
            <LanguageSwitcher lang={lang} setLang={setLang} />
          </div>

          <div className="text-center mb-8">
            <div className="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center mx-auto mb-4 shadow-lg">
              <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
              </svg>
            </div>
            <h1 className="text-3xl font-bold text-white">{t.pageTitle}</h1>
            <p className="text-gray-400 mt-2">{t.pageSubtitle}</p>
          </div>

          <div className="card rounded-2xl shadow-2xl p-8">
            <form onSubmit={handleSubmit} className="space-y-5">
              <div>
                <label className="block text-sm font-medium text-gray-300 mb-1.5">{t.email}</label>
                <input
                  type="email"
                  value={form.email}
                  onChange={update("email")}
                  placeholder={t.emailPlaceholder}
                  className="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-500"
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-300 mb-1.5">{t.password}</label>
                <input
                  type="password"
                  value={form.password}
                  onChange={update("password")}
                  placeholder={t.passwordPlaceholder}
                  className="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-500"
                />
              </div>

              {error && (
                <div className="bg-red-500 bg-opacity-10 border border-red-500 border-opacity-30 rounded-xl px-4 py-3 fade-in">
                  <p className="text-red-400 text-sm">{error}</p>
                </div>
              )}

              <button
                type="submit"
                disabled={loading}
                className="btn-primary w-full py-3 rounded-xl text-white font-semibold flex items-center justify-center gap-2"
              >
                {loading ? (
                  <>
                    <div className="spinner"></div>
                    {t.loggingIn}
                  </>
                ) : (
                  t.submitBtn
                )}
              </button>
            </form>

            <p className="text-center text-gray-500 text-sm mt-6">
              {t.noAccount} <a href="register.html" className="text-indigo-400 hover:text-indigo-300 font-medium">{t.register}</a>
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
