<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Бүртгэл — Multi-Tenant SaaS</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.5/babel.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height: 100vh; }
    .card { backdrop-filter: blur(12px); background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(148, 163, 184, 0.1); }
    .input-field { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(148, 163, 184, 0.2); transition: border-color 0.2s, box-shadow 0.2s; }
    .input-field:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); outline: none; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); transition: transform 0.15s, box-shadow 0.2s; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; width: 18px; height: 18px; }
    .lang-btn { transition: all 0.2s; }
    .lang-btn.active { background: rgba(99, 102, 241, 0.2); border-color: #6366f1; color: #a5b4fc; }
    .lang-btn:not(.active) { background: transparent; border-color: rgba(148, 163, 184, 0.2); color: #94a3b8; }
    .lang-btn:hover:not(.active) { border-color: rgba(148, 163, 184, 0.4); color: #cbd5e1; }
  </style>
</head>
<body class="flex items-center justify-center p-4">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const API_URL = "http://127.0.0.1:8000/api/v1";

    // --- Translation dictionary ---
    const translations = {
      mn: {
        pageTitle: "Байгууллагаа бүртгүүлэх",
        pageSubtitle: "Multi-Tenant SaaS платформд тавтай морил",
        orgName: "Байгууллагын нэр",
        orgPlaceholder: "Жишээ ХХК",
        fullName: "Таны бүтэн нэр",
        namePlaceholder: "Овог Нэр",
        email: "Имэйл хаяг",
        emailPlaceholder: "ta@company.mn",
        password: "Нууц үг",
        passwordPlaceholder: "Хамгийн багадаа 6 тэмдэгт",
        confirmPassword: "Нууц үг давтах",
        confirmPlaceholder: "Нууц үгээ дахин оруулна уу",
        submitBtn: "Байгууллага үүсгэх",
        creating: "Үүсгэж байна...",
        hasAccount: "Бүртгэлтэй юу?",
        signIn: "Нэвтрэх",
        // Success
        welcomeTitle: "Тавтай морил!",
        welcomeMsg: (name) => `Таны байгууллага "${name}" амжилттай бүртгэгдлээ.`,
        tenantId: "Байгууллагын ID",
        userId: "Хэрэглэгчийн ID",
        role: "Эрх",
        roleOwner: "Эзэмшигч",
        registerAnother: "Өөр байгууллага бүртгэх",
        // Validation
        errOrgRequired: "Байгууллагын нэр оруулна уу.",
        errNameRequired: "Бүтэн нэрээ оруулна уу.",
        errEmailRequired: "Имэйл хаяг оруулна уу.",
        errEmailInvalid: "Зөв имэйл хаяг оруулна уу.",
        errPasswordShort: "Нууц үг хамгийн багадаа 6 тэмдэгт байх ёстой.",
        errPasswordMismatch: "Нууц үг таарахгүй байна.",
        errServerDown: "Серверт холбогдож чадсангүй. Сервер 8000 порт дээр ажиллаж байгаа эсэхийг шалгана уу.",
        errDefault: "Бүртгэл амжилтгүй боллоо. Дахин оролдоно уу.",
        errEmailTaken: "Энэ имэйл хаяг бүртгэлтэй байна.",
        errTenantTaken: "Энэ байгууллагын нэр бүртгэлтэй байна.",
      },
      en: {
        pageTitle: "Create your organization",
        pageSubtitle: "Get started with the Multi-Tenant SaaS Platform",
        orgName: "Organization Name",
        orgPlaceholder: "Acme Inc.",
        fullName: "Your Full Name",
        namePlaceholder: "John Doe",
        email: "Email Address",
        emailPlaceholder: "you@company.com",
        password: "Password",
        passwordPlaceholder: "At least 6 characters",
        confirmPassword: "Confirm Password",
        confirmPlaceholder: "Re-enter your password",
        submitBtn: "Create Organization",
        creating: "Creating...",
        hasAccount: "Already have an account?",
        signIn: "Sign in",
        // Success
        welcomeTitle: "Welcome aboard!",
        welcomeMsg: (name) => `Your organization "${name}" has been created.`,
        tenantId: "Tenant ID",
        userId: "User ID",
        role: "Role",
        roleOwner: "Owner",
        registerAnother: "Register another organization",
        // Validation
        errOrgRequired: "Organization name is required.",
        errNameRequired: "Your full name is required.",
        errEmailRequired: "Email is required.",
        errEmailInvalid: "Please enter a valid email.",
        errPasswordShort: "Password must be at least 6 characters.",
        errPasswordMismatch: "Passwords do not match.",
        errServerDown: "Could not connect to the server. Is it running on port 8000?",
        errDefault: "Registration failed. Please try again.",
        errEmailTaken: "Email already registered.",
        errTenantTaken: "Tenant name already taken.",
      },
    };

    function LanguageSwitcher({ lang, setLang }) {
      return (
        <div className="flex gap-2">
          <button
            onClick={() => setLang("mn")}
            className={`lang-btn px-3 py-1.5 rounded-lg border text-sm font-medium ${lang === "mn" ? "active" : ""}`}
          >
            MN
          </button>
          <button
            onClick={() => setLang("en")}
            className={`lang-btn px-3 py-1.5 rounded-lg border text-sm font-medium ${lang === "en" ? "active" : ""}`}
          >
            EN
          </button>
        </div>
      );
    }

    function App() {
      const [lang, setLang] = useState("mn");
      const t = translations[lang];

      const [form, setForm] = useState({
        tenant_name: "",
        full_name: "",
        email: "",
        password: "",
        confirm_password: "",
      });
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");
      const [success, setSuccess] = useState(null);

      const update = (field) => (e) => {
        setForm({ ...form, [field]: e.target.value });
        setError("");
      };

      const validate = () => {
        if (!form.tenant_name.trim()) return t.errOrgRequired;
        if (!form.full_name.trim()) return t.errNameRequired;
        if (!form.email.trim()) return t.errEmailRequired;
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) return t.errEmailInvalid;
        if (form.password.length < 6) return t.errPasswordShort;
        if (form.password !== form.confirm_password) return t.errPasswordMismatch;
        return null;
      };

      const mapError = (detail) => {
        if (!detail) return t.errDefault;
        if (detail.includes("Email already")) return t.errEmailTaken;
        if (detail.includes("Tenant name") || detail.includes("already taken")) return t.errTenantTaken;
        return detail;
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        const err = validate();
        if (err) { setError(err); return; }

        setLoading(true);
        setError("");

        try {
          const res = await fetch(`${API_URL}/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              tenant_name: form.tenant_name,
              full_name: form.full_name,
              email: form.email,
              password: form.password,
            }),
          });

          const data = await res.json();

          if (!res.ok) {
            setError(mapError(data.detail));
            return;
          }

          // Store token and redirect to dashboard
          localStorage.setItem("token", data.access_token);
          localStorage.setItem("tenant_id", data.tenant_id);
          localStorage.setItem("user_id", data.user_id);
          window.location.href = "dashboard.html";
          return;
        } catch (err) {
          setError(t.errServerDown);
        } finally {
          setLoading(false);
        }
      };

      if (success) {
        return (
          <div className="w-full max-w-md fade-in">
            {/* Language switcher */}
            <div className="flex justify-end mb-4">
              <LanguageSwitcher lang={lang} setLang={setLang} />
            </div>

            <div className="card rounded-2xl shadow-2xl p-8 text-center">
              <div className="w-16 h-16 bg-green-500 bg-opacity-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg className="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                </svg>
              </div>
              <h2 className="text-2xl font-bold text-white mb-2">{t.welcomeTitle}</h2>
              <p className="text-gray-400 mb-6">{t.welcomeMsg(form.tenant_name)}</p>

              <div className="bg-gray-900 bg-opacity-50 rounded-xl p-4 text-left space-y-3 mb-6">
                <div>
                  <span className="text-gray-500 text-xs uppercase tracking-wider">{t.tenantId}</span>
                  <p className="text-gray-300 text-sm font-mono break-all">{success.tenant_id}</p>
                </div>
                <div>
                  <span className="text-gray-500 text-xs uppercase tracking-wider">{t.userId}</span>
                  <p className="text-gray-300 text-sm font-mono break-all">{success.user_id}</p>
                </div>
                <div>
                  <span className="text-gray-500 text-xs uppercase tracking-wider">{t.role}</span>
                  <p className="text-indigo-400 text-sm font-semibold">{t.roleOwner}</p>
                </div>
              </div>

              <button
                onClick={() => { setSuccess(null); setForm({ tenant_name: "", full_name: "", email: "", password: "", confirm_password: "" }); }}
                className="text-indigo-400 hover:text-indigo-300 text-sm font-medium transition-colors"
              >
                {t.registerAnother}
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="w-full max-w-md fade-in">
          {/* Language switcher */}
          <div className="flex justify-end mb-4">
            <LanguageSwitcher lang={lang} setLang={setLang} />
          </div>

          <div className="text-center mb-8">
            <div className="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center mx-auto mb-4 shadow-lg">
              <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
              </svg>
            </div>
            <h1 className="text-3xl font-bold text-white">{t.pageTitle}</h1>
            <p className="text-gray-400 mt-2">{t.pageSubtitle}</p>
          </div>

          <div className="card rounded-2xl shadow-2xl p-8">
            <form onSubmit={handleSubmit} className="space-y-5">
              <div>
                <label className="block text-sm font-medium text-gray-300 mb-1.5">{t.orgName}</label>
                <input
                  type="text"
                  value={form.tenant_name}
                  onChange={update("tenant_name")}
                  placeholder={t.orgPlaceholder}
                  className="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-500"
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-300 mb-1.5">{t.fullName}</label>
                <input
                  type="text"
                  value={form.full_name}
                  onChange={update("full_name")}
                  placeholder={t.namePlaceholder}
                  className="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-500"
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-300 mb-1.5">{t.email}</label>
                <input
                  type="email"
                  value={form.email}
                  onChange={update("email")}
                  placeholder={t.emailPlaceholder}
                  className="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-500"
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-300 mb-1.5">{t.password}</label>
                <input
                  type="password"
                  value={form.password}
                  onChange={update("password")}
                  placeholder={t.passwordPlaceholder}
                  className="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-500"
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-300 mb-1.5">{t.confirmPassword}</label>
                <input
                  type="password"
                  value={form.confirm_password}
                  onChange={update("confirm_password")}
                  placeholder={t.confirmPlaceholder}
                  className="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-500"
                />
              </div>

              {error && (
                <div className="bg-red-500 bg-opacity-10 border border-red-500 border-opacity-30 rounded-xl px-4 py-3 fade-in">
                  <p className="text-red-400 text-sm">{error}</p>
                </div>
              )}

              <button
                type="submit"
                disabled={loading}
                className="btn-primary w-full py-3 rounded-xl text-white font-semibold flex items-center justify-center gap-2"
              >
                {loading ? (
                  <>
                    <div className="spinner"></div>
                    {t.creating}
                  </>
                ) : (
                  t.submitBtn
                )}
              </button>
            </form>

            <p className="text-center text-gray-500 text-sm mt-6">
              {t.hasAccount} <a href="login.html" className="text-indigo-400 hover:text-indigo-300 font-medium">{t.signIn}</a>
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
